<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>popup</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="container">
            <header>
                <h2>Productivity Timer</h2>
                <div id="site" class="site">—</div>
            </header>

            <div class="status">
                <div id="timer" class="timer">Stopped</div>
                <div id="status" class="statusText"></div>
            </div>

            <div class="controls">
                <button id="start" class="primary">Start</button>
                <button id="reset">Reset</button>
            </div>

            <div class="progress">
                <div id="progressBar" class="progressBar"></div>
            </div>

            <div class="site-config">
                <h3>Blocked sites</h3>
                <div class="site-config__add">
                    <input id="blockedSiteInput" placeholder="example.com" />
                    <button id="addBlockedSite" class="primary">Add</button>
                </div>
                <ul id="blockedSitesList" class="blockedSitesList"></ul>
            </div>
        </div>

        <script src="popup.js"></script>

    </body>
</html>
